<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Recurring — Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body data-title="Recurring">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="recurring-page" id="recurringPage">
        <!-- Summary strip -->
        <div class="budget-summary-strip" style="grid-template-columns:repeat(3,1fr);margin-bottom:4px;">
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Active Rules</div>
            <div class="budget-summary-card__value" id="statActive">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Due Today</div>
            <div class="budget-summary-card__value" id="statDue">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Monthly Estimate</div>
            <div class="budget-summary-card__value" id="statMonthly">—</div>
          </div>
        </div>

        <!-- Due now banner -->
        <div class="card" id="dueSection" style="display:none;padding:0;overflow:hidden;">
          <div style="padding:14px 20px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--color-border);">
            <span style="display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;background:rgba(212,166,74,.15);color:#d4a64a;flex-shrink:0;">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </span>
            <span style="font-size:.8125rem;font-weight:600;color:var(--color-text);">Due now</span>
          </div>
          <div id="dueList"></div>
        </div>

        <!-- All rules -->
        <div class="card" id="allRulesCard" style="padding:0;overflow:hidden;">
          <div style="padding:14px 20px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:.875rem;font-weight:600;color:var(--color-text);">All recurring rules</span>
            <a href="add-transaction.html" class="btn btn--ghost btn--sm">+ Add recurring</a>
          </div>
          <div id="allRulesList"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/recurring.js"></script>
</body>
</html>
