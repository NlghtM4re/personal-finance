<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Subscriptions — Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body data-title="Subscriptions">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="subs-page" id="subsPage">

        <!-- Stats strip -->
        <div class="budget-summary-strip" style="grid-template-columns:repeat(4,1fr);">
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Monthly Cost</div>
            <div class="budget-summary-card__value" id="statMonthly">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Yearly Cost</div>
            <div class="budget-summary-card__value" id="statYearly">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Active</div>
            <div class="budget-summary-card__value" id="statActive">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Due This Month</div>
            <div class="budget-summary-card__value" id="statDue">—</div>
          </div>
        </div>

        <!-- Auto-logged banner -->
        <div class="card subs-autolog-banner" id="autoLogBanner" style="display:none;">
          <span class="subs-autolog-banner__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span id="autoLogMsg"></span>
        </div>

        <!-- Main grid: subscriptions list + add form -->
        <div class="subs-main-grid">

          <!-- Left: subscription list -->
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="card" style="padding:0;overflow:hidden;">
              <div class="subs-list-header">
                <span style="font-size:.875rem;font-weight:600;color:var(--color-text);">Active subscriptions</span>
                <button class="btn btn--primary btn--sm" id="addSubBtn">
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                  Add subscription
                </button>
              </div>
              <div id="subsList"></div>
            </div>

            <!-- Paused -->
            <div class="card" id="pausedCard" style="padding:0;overflow:hidden;display:none;">
              <div class="subs-list-header">
                <span style="font-size:.875rem;font-weight:600;color:var(--color-text-muted);">Paused</span>
              </div>
              <div id="pausedList"></div>
            </div>
          </div>

          <!-- Right: add/edit form -->
          <div class="card subs-form-card" id="subFormCard" style="display:none;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
              <h2 style="font-size:.9375rem;font-weight:700;margin:0;" id="formTitle">New subscription</h2>
              <button class="btn btn--ghost btn--sm" id="closeFormBtn" aria-label="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <form id="subForm" autocomplete="off">
              <input type="hidden" id="editId" />
              <div class="subs-form-field" id="presetField">
                <label class="form-label">Quick add</label>
                <div class="subs-preset-row" id="presetRow"></div>
              </div>
              <div class="subs-form-field">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" id="fName" placeholder="Netflix, Spotify…" required />
              </div>
              <div class="subs-form-row">
                <div class="subs-form-field">
                  <label class="form-label">Amount</label>
                  <input type="number" class="form-control" id="fAmount" min="0.01" step="0.01" placeholder="0.00" required />
                </div>
                <div class="subs-form-field">
                  <label class="form-label">Frequency</label>
                  <select class="form-control" id="fFrequency">
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                    <option value="weekly">Weekly</option>
                  </select>
                </div>
              </div>
              <div class="subs-form-field">
                <label class="subs-autolog-toggle">
                  <input type="checkbox" id="fTax" />
                  <span class="subs-autolog-toggle__track"></span>
                  <span class="subs-autolog-toggle__label">Add QC taxes (GST + QST · 14.975%)</span>
                </label>
                <div class="subs-tax-hint" id="taxHint" style="display:none;"></div>
              </div>
              <div class="subs-form-field">
                <label class="form-label">Next billing date</label>
                <input type="date" class="form-control" id="fNextDue" required />
              </div>
              <div class="subs-form-field">
                <label class="form-label">Account</label>
                <select class="form-control" id="fAccount">
                  <option value="">— none —</option>
                </select>
              </div>
              <div class="subs-form-field">
                <label class="form-label">Category</label>
                <select class="form-control" id="fCategory">
                  <option value="">— none —</option>
                </select>
              </div>
              <div class="subs-form-field">
                <label class="form-label">Color</label>
                <div class="subs-color-row" id="colorRow"></div>
              </div>
              <div class="subs-form-field">
                <label class="subs-autolog-toggle">
                  <input type="checkbox" id="fAutoLog" checked />
                  <span class="subs-autolog-toggle__track"></span>
                  <span class="subs-autolog-toggle__label">Auto-log transaction on due date</span>
                </label>
              </div>
              <div style="display:flex;gap:8px;margin-top:4px;">
                <button type="submit" class="btn btn--primary" style="flex:1;" id="formSubmitBtn">Save</button>
                <button type="button" class="btn btn--ghost" id="deleteSubBtn" style="display:none;color:var(--color-expense);">Delete</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Analytics section -->
        <div class="subs-analytics" id="analyticsSection">
          <div class="subs-analytics__header">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Analytics
          </div>
          <div class="subs-analytics__grid">

            <!-- Monthly trend chart -->
            <div class="card subs-chart-card">
              <div class="card-header">
                <h3 class="card-title">Monthly subscription spend</h3>
              </div>
              <div style="position:relative;height:180px;">
                <canvas id="trendCanvas" role="img" aria-label="Monthly subscription spend bar chart"></canvas>
                <div class="chart-skeleton" id="trendSkeleton">
                  <div class="chart-skeleton__bar" style="height:60%"></div>
                  <div class="chart-skeleton__bar" style="height:75%"></div>
                  <div class="chart-skeleton__bar" style="height:55%"></div>
                  <div class="chart-skeleton__bar" style="height:80%"></div>
                  <div class="chart-skeleton__bar" style="height:70%"></div>
                  <div class="chart-skeleton__bar" style="height:90%"></div>
                </div>
              </div>
            </div>

            <!-- Upcoming 30 days -->
            <div class="card" style="padding:0;overflow:hidden;">
              <div class="card-header" style="padding:14px 20px;">
                <h3 class="card-title">Upcoming bills</h3>
                <span style="font-size:.75rem;color:var(--color-text-muted);">Next 30 days</span>
              </div>
              <div id="upcomingList" style="max-height:260px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--color-border) transparent;"></div>
            </div>

            <!-- Category breakdown -->
            <div class="card subs-chart-card">
              <div class="card-header">
                <h3 class="card-title">By category</h3>
              </div>
              <div style="position:relative;height:180px;">
                <canvas id="catCanvas" role="img" aria-label="Subscriptions by category donut chart"></canvas>
                <div class="chart-skeleton chart-skeleton--donut" id="catSkeleton"></div>
              </div>
              <div id="catLegend" style="margin-top:12px;display:flex;flex-direction:column;gap:6px;"></div>
            </div>

            <!-- Pattern alerts -->
            <div class="card" style="padding:0;overflow:hidden;">
              <div class="card-header" style="padding:14px 20px;">
                <h3 class="card-title">Pattern insights</h3>
              </div>
              <div id="patternList" style="padding:0 0 4px;"></div>
            </div>

          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/subscriptions.js"></script>
</body>
</html>
