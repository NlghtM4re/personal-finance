<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Add Transaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body data-title="Add Transaction" data-title-id="formTitle">

  
  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>
<div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="form-page">
        <div class="card form-card">

          <form id="txForm" novalidate>

            <!-- Type selector -->
            <div class="form-group form-group--full" style="margin-bottom:20px;">
              <div class="type-toggle">
                <button type="button" class="type-btn active" data-type="expense">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14m0 0-7-7m7 7 7-7"/></svg>
                  Expense
                </button>
                <button type="button" class="type-btn" data-type="income">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5m0 0-7 7m7-7 7 7"/></svg>
                  Income
                </button>
                <button type="button" class="type-btn" data-type="transfer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
                  Transfer
                </button>
              </div>
            </div>

            <!-- Amount + Date -->
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="txAmount">Amount *</label>
                <div class="input-with-prefix">
                  <span class="input-prefix" id="currencyPrefix">$</span>
                  <input type="number" id="txAmount" class="form-control"
                    placeholder="0.00" min="0.01" step="0.01" required autofocus />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="txDate">Date *</label>
                <input type="date" id="txDate" class="form-control" required />
              </div>
            </div>

            <!-- Account -->
            <div class="form-grid" style="margin-top:16px;">
              <div class="form-group">
                <label class="form-label" for="txAccount">Account *</label>
                <select id="txAccount" class="form-control"></select>
              </div>
              <div class="form-group" id="toAccountGroup" style="display:none;">
                <label class="form-label" for="txToAccount">To Account *</label>
                <select id="txToAccount" class="form-control"></select>
              </div>
            </div>

            <!-- Note -->
            <div class="form-group form-group--full" style="margin-top:16px;">
              <label class="form-label" for="txNote">Note</label>
              <input type="text" id="txNote" class="form-control"
                placeholder="What was this for?" maxlength="120" />
              <div class="form-hint">Optional description for this transaction.</div>
            </div>

            <!-- Tags -->
            <div class="form-group form-group--full" style="margin-top:16px;">
              <label class="form-label" for="tagInput">Tags</label>
              <div class="tag-input-wrap">
                <div class="tag-list" id="tagList"></div>
                <input type="text" id="tagInput" class="tag-input"
                  placeholder="Add tag, press Enter…" maxlength="24" autocomplete="off" />
              </div>
              <div class="form-hint">Press Enter or comma to add. Click × to remove.</div>
            </div>

            <!-- Category picker -->
            <div class="form-group form-group--full" style="margin-top:20px;">
              <p class="form-section-title">Category</p>
              <div class="cat-suggestion" id="catSuggestion" hidden></div>
              <div class="category-grid" id="categoryPicker"></div>
            </div>

            <!-- Actions -->
            <div id="formActions" style="display:flex;flex-direction:column;gap:10px;margin-top:28px;">
              <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button type="submit" class="btn btn--primary" id="submitBtn" style="flex:1;">
                  Add Transaction
                </button>
                <button type="button" class="btn btn--danger btn--sm" id="deleteBtn" style="display:none;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                  Delete
                </button>
              </div>
            </div>

          </form>
        </div>

        <!-- Quick tip if no accounts -->
        <div class="card" id="noAccountTip" style="display:none;margin-top:12px;">
          <p style="color:var(--color-text-muted);font-size:.875rem;">
            You don't have any accounts yet.
            <a href="accounts.html">Create an account</a> before adding transactions.
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <!-- Quick new category modal -->
  <div class="modal-overlay" id="newCatModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">New category</h3>
        <button class="modal-close" id="closeNewCatModal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:10px;">
        <input type="text" id="quickCatName" class="form-control" placeholder="Category name" maxlength="30" style="flex:1;" />
        <input type="hidden" id="quickCatIcon" />
      </div>
      <div id="quickCatEmojiRow" class="icon-picker" style="margin-bottom:6px;"></div>
      <p style="color:var(--color-text-muted);font-size:.75rem;line-height:1.5;" id="quickCatTypeHint"></p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="cancelNewCat">Cancel</button>
        <button class="btn btn--primary" id="saveNewCat">Create &amp; select</button>
      </div>
    </div>
  </div>

  <!-- Delete transaction modal -->
  <div class="modal-overlay" id="deleteTxModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Delete Transaction?</h3>
        <button class="modal-close" id="closeTxDeleteModal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p style="color:var(--color-text-muted);font-size:.875rem;line-height:1.6;">This action cannot be undone. The transaction will be permanently removed.</p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="cancelTxDelete">Cancel</button>
        <button class="btn btn--danger" id="confirmTxDelete">Delete transaction</button>
      </div>
    </div>
  </div>

  <script src="../scripts/components/error-overlay.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/engine/insights.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/add-transaction.js"></script>
  <!-- Account hydration is handled by add-transaction.js after auth -->
</body>
</html>
