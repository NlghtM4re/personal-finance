<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Add Transaction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <span class="logo-text">FinTrack</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item">
        <span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="transactions.html" class="nav-item">
        <span class="nav-icon">↕</span><span class="nav-label">Transactions</span>
      </a>
      <a href="accounts.html" class="nav-item">
        <span class="nav-icon">◈</span><span class="nav-label">Accounts</span>
      </a>
      <a href="add-transaction.html" class="nav-item nav-item--accent active">
        <span class="nav-icon">+</span><span class="nav-label">Add Transaction</span>
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <span class="theme-icon" id="themeIcon">🌙</span>
        <span>Dark Mode</span>
      </button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title" id="formTitle">Add Transaction</div>
      <div class="topbar-actions">
        <button class="btn btn--ghost btn--sm" id="cancelBtn">Cancel</button>
      </div>
    </header>

    <main class="main-content">
      <div class="form-page">
        <div class="card form-card">

          <form id="txForm" novalidate>

            <!-- Type selector -->
            <div class="form-group form-group--full" style="margin-bottom:20px;">
              <div class="type-toggle">
                <button type="button" class="type-btn active" data-type="expense">↓ Expense</button>
                <button type="button" class="type-btn" data-type="income">↑ Income</button>
                <button type="button" class="type-btn" data-type="transfer">↔ Transfer</button>
              </div>
            </div>

            <!-- Amount + Date -->
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="txAmount">Amount *</label>
                <div class="input-with-prefix">
                  <span class="input-prefix">$</span>
                  <input type="number" id="txAmount" class="form-control"
                    placeholder="0.00" min="0.01" step="0.01" required autofocus />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="txDate">Date *</label>
                <input type="date" id="txDate" class="form-control" required />
              </div>
            </div>

            <!-- Account -->
            <div class="form-grid" style="margin-top:16px;">
              <div class="form-group">
                <label class="form-label" for="txAccount">Account *</label>
                <select id="txAccount" class="form-control"></select>
              </div>
              <div class="form-group" id="toAccountGroup" style="display:none;">
                <label class="form-label" for="txToAccount">To Account *</label>
                <select id="txToAccount" class="form-control"></select>
              </div>
            </div>

            <!-- Note -->
            <div class="form-group form-group--full" style="margin-top:16px;">
              <label class="form-label" for="txNote">Note</label>
              <input type="text" id="txNote" class="form-control"
                placeholder="What was this for?" maxlength="120" />
              <div class="form-hint">Optional description for this transaction.</div>
            </div>

            <!-- Category picker -->
            <div class="form-group form-group--full" style="margin-top:20px;">
              <p class="form-section-title">Category</p>
              <div class="category-grid" id="categoryPicker"></div>
            </div>

            <!-- Actions -->
            <div style="display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;">
              <button type="submit" class="btn btn--primary" id="submitBtn" style="flex:1;">
                Add Transaction
              </button>
              <button type="button" class="btn btn--danger btn--sm" id="deleteBtn" style="display:none;">
                🗑️ Delete
              </button>
            </div>

          </form>
        </div>

        <!-- Quick tip if no accounts -->
        <div class="card" id="noAccountTip" style="display:none;margin-top:12px;">
          <p style="color:var(--color-text-muted);font-size:.875rem;">
            You don't have any accounts yet.
            <a href="accounts.html">Create an account</a> before adding transactions.
          </p>
        </div>
      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="../index.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">⊞</span><span class="bottom-nav__label">Dashboard</span>
    </a>
    <a href="transactions.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">↕</span><span class="bottom-nav__label">Transactions</span>
    </a>
    <a href="add-transaction.html" class="bottom-nav__item bottom-nav__item--add active">
      <span class="bottom-nav__icon">+</span>
    </a>
    <a href="accounts.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">◈</span><span class="bottom-nav__label">Accounts</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/add-transaction.js"></script>
  <script>
    /* Show tip if no accounts exist */
    document.addEventListener('DOMContentLoaded', () => {
      if (!AccountStore.getAll().length) {
        document.getElementById('noAccountTip').style.display = 'block';
      }
      /* Populate toAccount select as well */
      const toSel = document.getElementById('txToAccount');
      if (toSel) {
        toSel.innerHTML = AccountStore.getAll()
          .map(a => `<option value="${a.id}">${a.name}</option>`).join('');
      }
    });
  </script>
</body>
</html>
