<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Crypto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body data-title="Crypto">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="crypto-page" id="cryptoPage">

        <!-- Portfolio hero -->
        <div class="card crypto-hero">
          <div class="crypto-hero__label">Crypto portfolio · <span id="cryptoCurrency">CAD</span></div>
          <div class="crypto-hero__row">
            <div class="font-display crypto-hero__total" id="cryptoTotal">—</div>
            <span class="delta delta--flat" id="cryptoHeroChange" hidden></span>
          </div>
          <div class="crypto-alloc" id="cryptoAlloc" hidden></div>
          <div class="crypto-legend" id="cryptoLegend" hidden></div>
          <div class="crypto-hero__meta">
            <span id="cryptoWalletCount">0 wallets</span> · read-only ·
            <a href="#" id="cryptoRefresh">refresh</a>
          </div>
        </div>

        <!-- Add wallet (collapsible) -->
        <div class="crypto-add">
          <button class="btn btn--ghost crypto-add__toggle" id="cwToggle" aria-expanded="false">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Add wallet
          </button>
          <div class="card crypto-add__panel" id="cwPanel" hidden>
            <div class="crypto-add__note">
              <span class="crypto-add__shield">
                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </span>
              <div>
                <strong style="color:var(--color-text);">Read-only.</strong> Paste your <strong style="color:var(--color-text);">public receive address</strong> only.
                <strong style="color:var(--color-expense);">Never a seed phrase or private key.</strong>
              </div>
            </div>
            <div class="crypto-add__form">
              <div class="crypto-add__row">
                <select id="cwChain" class="settings-select">
                  <option value="btc">Bitcoin (BTC)</option>
                  <option value="sol">Solana (SOL)</option>
                </select>
                <input id="cwLabel" class="form-control" type="text" placeholder="Label (optional)" maxlength="32" autocomplete="off" />
              </div>
              <input id="cwAddress" class="form-control" type="text" placeholder="Public address" autocomplete="off" spellcheck="false" />
              <div id="cwError" style="display:none;font-size:.75rem;color:var(--color-expense);"></div>
              <div id="cwBtcHint" style="display:none;font-size:.72rem;color:var(--color-text-muted);line-height:1.5;">
                Exodus rotates BTC receive addresses, so one address may show only part of your balance. Add each address you've received to, to cover the full total.
              </div>
              <div>
                <button id="cwAddBtn" class="btn btn--primary btn--sm">Add wallet</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Wallet tiles -->
        <div class="term-cells dash-tiles" id="cryptoList"></div>

      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="../scripts/components/error-overlay.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/data/crypto.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/components/dialog.js"></script>
  <script src="../scripts/pages/crypto.js"></script>
</body>
</html>
