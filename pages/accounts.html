<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Accounts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <span class="logo-text">FinTrack</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item">
        <span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="transactions.html" class="nav-item">
        <span class="nav-icon">↕</span><span class="nav-label">Transactions</span>
      </a>
      <a href="accounts.html" class="nav-item active">
        <span class="nav-icon">◈</span><span class="nav-label">Accounts</span>
      </a>
      <a href="add-transaction.html" class="nav-item nav-item--accent">
        <span class="nav-icon">+</span><span class="nav-label">Add Transaction</span>
      </a>
      <a href="settings.html" class="nav-item">
        <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <span class="theme-icon" id="themeIcon">🌙</span>
        <span>Dark Mode</span>
      </button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title">Accounts</div>
      <div class="topbar-actions">
        <button class="btn btn--primary btn--sm" id="newAccountBtn">+ New Account</button>
      </div>
    </header>

    <main class="main-content">
      <div class="accounts-grid" id="accountsGrid">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="../index.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">⊞</span><span class="bottom-nav__label">Dashboard</span>
    </a>
    <a href="transactions.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">↕</span><span class="bottom-nav__label">Transactions</span>
    </a>
    <a href="add-transaction.html" class="bottom-nav__item bottom-nav__item--add">
      <span class="bottom-nav__icon">+</span>
    </a>
    <a href="accounts.html" class="bottom-nav__item active">
      <span class="bottom-nav__icon">◈</span><span class="bottom-nav__label">Accounts</span>
    </a>
    <a href="settings.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">⚙</span><span class="bottom-nav__label">Settings</span>
    </a>
  </nav>

  <!-- Account modal -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="accountModalTitle">New Account</h3>
        <button class="modal-close" id="closeAccountModal">✕</button>
      </div>
      <form id="accForm" novalidate>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="form-group">
            <label class="form-label" for="accName">Account Name *</label>
            <input type="text" id="accName" class="form-control" placeholder="e.g. Main Bank, Cash Wallet" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="accType">Account Type</label>
            <select id="accType" class="form-control">
              <option value="bank">Bank Account</option>
              <option value="cash">Cash</option>
              <option value="credit">Credit Card</option>
              <option value="savings">Savings</option>
              <option value="investment">Investment</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="accBalance">Starting Balance</label>
            <div class="input-with-prefix">
              <span class="input-prefix">$</span>
              <input type="number" id="accBalance" class="form-control" placeholder="0.00" step="0.01" />
            </div>
            <div class="form-hint">Your balance before you start tracking in FinTrack.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="accColor">Color</label>
            <input type="color" id="accColor" class="form-control" style="height:42px;padding:4px 8px;cursor:pointer;" value="#6366f1" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn--ghost" id="cancelAccount">Cancel</button>
          <button type="submit" class="btn btn--primary">Save Account</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/accounts.js"></script>
  <script>
    document.getElementById('newAccountBtn')?.addEventListener('click', () => openAccountModal(null));
  </script>
</body>
</html>
