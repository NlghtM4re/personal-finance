<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Accounts — Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body data-title="Accounts & Transactions">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="acctx-layout">

        <!-- LEFT: Accounts -->
        <section class="acctx-accounts">
          <div class="card card--static">
            <div class="card-header">
              <h2 class="card-title">Accounts</h2>
              <button class="btn btn--ghost btn--sm" id="newAccountBtn" aria-label="New account">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              </button>
            </div>
            <div class="accounts-grid" id="accountsGrid">
              <div class="spinner"></div>
            </div>
          </div>

          <!-- Account summary card -->
          <div class="card card--static acc-summary-card">
            <div class="acc-nw-headline">
              <div class="acc-nw-label">Net Worth</div>
              <div class="acc-nw-value" id="accNetWorth">—</div>
              <div class="acc-nw-count"><span id="accCount">—</span> accounts</div>
              <div class="acc-nw-crypto" id="accNwCrypto" style="display:none;font-family:var(--font-display);font-size:.68rem;color:var(--color-text-muted);margin-top:3px;"></div>
            </div>
            <div class="acc-nw-bar-track">
              <div class="acc-nw-bar-fill" id="accNwBarFill"></div>
            </div>
            <div class="acc-stats-row">
              <div class="acc-stat-item">
                <div class="acc-stat-dot acc-stat-dot--income"></div>
                <div>
                  <div class="acc-stat-label">Assets</div>
                  <div class="acc-stat-value acc-stat-value--income" id="accTotalAssets">—</div>
                </div>
              </div>
              <div class="acc-stat-item">
                <div class="acc-stat-dot acc-stat-dot--expense"></div>
                <div>
                  <div class="acc-stat-label">Debts</div>
                  <div class="acc-stat-value acc-stat-value--expense" id="accTotalDebts">—</div>
                </div>
              </div>
            </div>
          </div>

        </section>

        <!-- RIGHT: Transactions -->
        <section class="acctx-transactions">

          <!-- Stats + Filters merged -->
          <div class="card card--static">
            <div class="transactions-stats">
              <span class="stat-chip" id="statCount">—</span>
              <span class="stat-chip stat-chip--income" id="statIncome">↑ —</span>
              <span class="stat-chip stat-chip--expense" id="statExpense">↓ —</span>
              <span class="stat-chip" id="statNet">— net</span>
            </div>
            <div class="tx-divider"></div>
            <div class="filter-bar">
              <div class="search-input">
                <span class="search-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </span>
                <input type="text" id="searchInput" class="form-control" placeholder="Search…" />
              </div>
              <select id="filterType" class="select--sm">
                <option value="">All Types</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
                <option value="transfer">Transfer</option>
              </select>
              <select id="filterCategory" class="select--sm"></select>
              <select id="filterAccount" class="select--sm"></select>
              <input type="date" id="filterFrom" class="select--sm" title="From date" />
              <input type="date" id="filterTo"   class="select--sm" title="To date" />
              <button id="clearFilters" class="btn btn--ghost btn--sm">Clear</button>
            </div>
          </div>

          <!-- Transaction list -->
          <div class="card card--static" style="overflow:hidden;">
            <div class="tx-list-full" id="txListFull">
              <div class="spinner"></div>
            </div>
            <div class="pagination" id="pagination"></div>
          </div>

        </section>
      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <!-- Account modal -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="accountModalTitle">New Account</h3>
        <button class="modal-close" id="closeAccountModal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="accForm" novalidate>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="form-group">
            <label class="form-label" for="accName">Account Name *</label>
            <input type="text" id="accName" class="form-control" placeholder="e.g. Main Bank, Cash Wallet" required />
          </div>
          <div class="form-group">
            <label class="form-label" for="accType">Account Type</label>
            <select id="accType" class="form-control">
              <option value="bank">Bank Account</option>
              <option value="cash">Cash</option>
              <option value="credit">Credit Card</option>
              <option value="savings">Savings</option>
              <option value="investment">Investment</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="accBalance">Starting Balance</label>
            <div class="input-with-prefix">
              <span class="input-prefix">$</span>
              <input type="number" id="accBalance" class="form-control" placeholder="0.00" step="0.01" />
            </div>
            <div class="form-hint">Your balance before you start tracking.</div>
          </div>
          <div class="form-group">
            <label class="form-label" for="accColor">Color</label>
            <input type="color" id="accColor" class="form-control" style="height:42px;padding:4px 8px;cursor:pointer;" value="#6366f1" />
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn--ghost" id="cancelAccount">Cancel</button>
          <button type="submit" class="btn btn--primary">Save Account</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete account modal -->
  <div class="modal-overlay" id="deleteAccountModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Delete Account?</h3>
        <button class="modal-close" id="closeDeleteAccountModal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p id="deleteAccountMsg" style="color:var(--color-text-muted);font-size:.875rem;line-height:1.6;">
        This action cannot be undone.
      </p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="cancelDeleteAccount">Cancel</button>
        <button class="btn btn--danger" id="confirmDeleteAccount">Delete account</button>
      </div>
    </div>
  </div>

  <!-- Delete transaction modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Delete Transaction?</h3>
        <button class="modal-close" id="closeDeleteModal" aria-label="Close">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <p style="color:var(--color-text-muted);font-size:.875rem;line-height:1.6;">
        This action cannot be undone. The transaction will be permanently removed.
      </p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="cancelDelete">Cancel</button>
        <button class="btn btn--danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/data/crypto.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/accounts.js"></script>
  <script src="../scripts/pages/transactions.js"></script>
  <script>
    document.getElementById('newAccountBtn')?.addEventListener('click', () => openAccountModal(null));
  </script>
</body>
</html>
