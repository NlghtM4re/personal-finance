  <div class="overlay" id="overlay"></div>
<div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Open menu"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>

      <div class="topbar-title">Settings</div>
    </header>

    <main class="main-content">
      <div class="form-page">

        <!-- Account card -->
        <div class="card form-card">
          <h2 class="card-title" style="margin-bottom:18px;">Account</h2>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
            <div class="settings-user-avatar">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <div style="font-weight:600;font-size:.9375rem;letter-spacing:-0.01em;" id="userEmail">—</div>
              <div style="font-size:.8125rem;color:var(--color-text-muted);">Signed in</div>
            </div>
          </div>
          <button type="button" id="logoutBtn" class="btn btn--ghost btn--sm">Sign out</button>
        </div>

        <!-- Danger zone -->
        <div class="card" style="border-color:rgba(239,68,68,.35);">
          <h3 style="margin-bottom:4px;color:var(--color-expense);letter-spacing:-0.01em;">Danger Zone</h3>
          <p style="color:var(--color-text-muted);font-size:.875rem;margin-bottom:16px;line-height:1.6;">
            Permanently delete all your data. This cannot be undone.
          </p>
          <button type="button" id="deleteDataBtn" class="btn btn--danger btn--sm">Delete all my data</button>
        </div>

      </div>
    </main>
