<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <span class="logo-text">FinTrack</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item">
        <span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="transactions.html" class="nav-item">
        <span class="nav-icon">↕</span><span class="nav-label">Transactions</span>
      </a>
      <a href="accounts.html" class="nav-item">
        <span class="nav-icon">◈</span><span class="nav-label">Accounts</span>
      </a>
      <a href="add-transaction.html" class="nav-item nav-item--accent">
        <span class="nav-icon">+</span><span class="nav-label">Add Transaction</span>
      </a>
      <a href="settings.html" class="nav-item active">
        <span class="nav-icon">⚙</span><span class="nav-label">Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <span class="theme-icon" id="themeIcon">🌙</span>
        <span>Dark Mode</span>
      </button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title">Settings</div>
    </header>

    <main class="main-content">
      <div class="form-page">

        <!-- Account card -->
        <div class="card form-card">
          <h2 class="card-title" style="margin-bottom:18px;">Account</h2>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
            <div style="width:44px;height:44px;border-radius:50%;background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;">👤</div>
            <div>
              <div style="font-weight:600;font-size:.9375rem;" id="userEmail">—</div>
              <div style="font-size:.8125rem;color:var(--color-text-muted);">Signed in</div>
            </div>
          </div>
          <button type="button" id="logoutBtn" class="btn btn--ghost btn--sm">Sign out</button>
        </div>

        <!-- Danger zone -->
        <div class="card" style="border-color:var(--color-expense);">
          <h3 style="margin-bottom:4px;color:var(--color-expense);">Danger Zone</h3>
          <p style="color:var(--color-text-muted);font-size:.875rem;margin-bottom:16px;">
            Permanently delete all your data. This cannot be undone.
          </p>
          <button type="button" id="deleteDataBtn" class="btn btn--danger btn--sm">Delete all my data</button>
        </div>

      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="../index.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">⊞</span><span class="bottom-nav__label">Dashboard</span>
    </a>
    <a href="transactions.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">↕</span><span class="bottom-nav__label">Transactions</span>
    </a>
    <a href="add-transaction.html" class="bottom-nav__item bottom-nav__item--add">
      <span class="bottom-nav__icon">+</span>
    </a>
    <a href="accounts.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">◈</span><span class="bottom-nav__label">Accounts</span>
    </a>
    <a href="settings.html" class="bottom-nav__item active">
      <span class="bottom-nav__icon">⚙</span><span class="bottom-nav__label">Settings</span>
    </a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/settings.js"></script>
</body>
</html>
