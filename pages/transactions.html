<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Transactions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <span class="logo-text">FinTrack</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item">
        <span class="nav-icon">⊞</span><span class="nav-label">Dashboard</span>
      </a>
      <a href="transactions.html" class="nav-item active">
        <span class="nav-icon">↕</span><span class="nav-label">Transactions</span>
      </a>
      <a href="accounts.html" class="nav-item">
        <span class="nav-icon">◈</span><span class="nav-label">Accounts</span>
      </a>
      <a href="add-transaction.html" class="nav-item nav-item--accent">
        <span class="nav-icon">+</span><span class="nav-label">Add Transaction</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" id="themeToggle">
        <span class="theme-icon" id="themeIcon">🌙</span>
        <span>Dark Mode</span>
      </button>
    </div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-btn" id="menuBtn">☰</button>
      <div class="topbar-title">Transactions</div>
      <div class="topbar-actions">
        <a href="add-transaction.html" class="btn btn--primary btn--sm">+ Add</a>
      </div>
    </header>

    <main class="main-content">

      <!-- Stats row -->
      <div class="card">
        <div class="transactions-header">
          <div class="transactions-stats">
            <span class="stat-chip" id="statCount">0 transactions</span>
            <span class="stat-chip stat-chip--income">↑ <span id="statIncome">$0.00</span></span>
            <span class="stat-chip stat-chip--expense">↓ <span id="statExpense">$0.00</span></span>
            <span class="stat-chip" id="statNet">Net: $0.00</span>
          </div>
        </div>
      </div>

      <!-- Filters -->
      <div class="card">
        <div class="filter-bar">
          <div class="search-input">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search by note…" />
          </div>
          <select id="filterType" class="select--sm">
            <option value="">All Types</option>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
            <option value="transfer">Transfer</option>
          </select>
          <select id="filterCategory" class="select--sm"></select>
          <select id="filterAccount" class="select--sm"></select>
          <input type="date" id="filterFrom" class="select--sm" title="From date" />
          <input type="date" id="filterTo"   class="select--sm" title="To date" />
          <button id="clearFilters" class="btn btn--ghost btn--sm">Clear</button>
        </div>
      </div>

      <!-- Transaction list -->
      <div class="card">
        <div class="tx-list-full" id="txListFull">
          <div class="spinner"></div>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>

    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="../index.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">⊞</span><span class="bottom-nav__label">Dashboard</span>
    </a>
    <a href="transactions.html" class="bottom-nav__item active">
      <span class="bottom-nav__icon">↕</span><span class="bottom-nav__label">Transactions</span>
    </a>
    <a href="add-transaction.html" class="bottom-nav__item bottom-nav__item--add">
      <span class="bottom-nav__icon">+</span>
    </a>
    <a href="accounts.html" class="bottom-nav__item">
      <span class="bottom-nav__icon">◈</span><span class="bottom-nav__label">Accounts</span>
    </a>
  </nav>

  <!-- Delete confirmation modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Delete Transaction?</h3>
        <button class="modal-close" id="closeDeleteModal">✕</button>
      </div>
      <p style="color:var(--color-text-muted);font-size:.875rem;">
        This action cannot be undone. The transaction will be permanently removed.
      </p>
      <div class="modal-footer">
        <button class="btn btn--ghost" id="cancelDelete">Cancel</button>
        <button class="btn btn--danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="../scripts/data/api.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/transactions.js"></script>
</body>
</html>
