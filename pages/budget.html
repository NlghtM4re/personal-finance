<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Budget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
</head>
<body data-title="Budget">

  <!-- Minimalist boot screen — see styles/main.css (#app-loader). Reveals once
       the page has painted; safety-net auto-hide guards slow/stuck loads. -->
  <div id="app-loader" role="status" aria-label="Loading">
    <div class="app-loader__mark">Flow</div>
    <div class="app-loader__bar"></div>
  </div>
  <script>
    window.hideAppLoader = function () {
      var el = document.getElementById('app-loader');
      if (el) el.classList.add('is-hidden');
    };
    window.addEventListener('load', function () {
      requestAnimationFrame(function () { setTimeout(window.hideAppLoader, 120); });
    });
    setTimeout(function () { window.hideAppLoader(); }, 6000);
  </script>

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>
  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="budget-page">

        <!-- Month navigator -->
        <div class="budget-month-nav">
          <button class="btn btn--ghost btn--sm" id="prevMonthBtn" aria-label="Previous month">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="budget-month-label" id="monthLabel">—</span>
          <button class="btn btn--ghost btn--sm" id="nextMonthBtn" aria-label="Next month">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>

        <!-- Summary strip -->
        <div class="budget-summary-strip">
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Total Budget</div>
            <div class="budget-summary-card__value" id="summaryBudget">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">Spent</div>
            <div class="budget-summary-card__value budget-summary-card__value--expense" id="summarySpent">—</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label" id="summaryRemainingLabel">Remaining</div>
            <div class="budget-summary-card__value" id="summaryRemaining">—</div>
          </div>
        </div>

        <!-- Copy from last month prompt -->
        <div class="card budget-copy-card" id="copyFromPrev" style="display:none;">
          <div class="budget-copy-card__text">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            No budgets set for this month
          </div>
          <button class="btn btn--ghost btn--sm" id="copyBtn">Copy from last month</button>
        </div>

        <!-- Suggest budgets from history (Phase 2 intelligence) -->
        <div class="card budget-copy-card" id="suggestBudgets" style="display:none;">
          <div class="budget-copy-card__text">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V17h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
            <span id="suggestBudgetsText">Set budgets from your last 3 months</span>
          </div>
          <button class="btn btn--ghost btn--sm" id="suggestBtn">Suggest budgets</button>
        </div>

        <!-- Category list -->
        <div class="card budget-list-card">
          <div class="budget-list-header">
            <span class="budget-list-header__cat">Category</span>
            <span class="budget-list-header__bar">Progress</span>
            <span class="budget-list-header__nums">Spent / Budget</span>
          </div>
          <div id="budgetCategoryList">
            <div class="empty-state">Loading…</div>
          </div>
        </div>

        <p class="budget-hint">Click any budget amount to edit it inline.</p>

      </div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="../scripts/components/error-overlay.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/engine/insights.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/budget.js"></script>
</body>
</html>
