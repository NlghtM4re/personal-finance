<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Hours Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body data-title="Hours Tracker">

  <!-- Minimalist boot screen — see styles/main.css (#app-loader). Reveals once
       the page has painted; safety-net auto-hide guards slow/stuck loads. -->
  <div id="app-loader" role="status" aria-label="Loading">
    <div class="app-loader__card">
      <div class="app-loader__mark">Flow</div>
      <div class="app-loader__bar"></div>
    </div>
  </div>
  <script>
    window.hideAppLoader = function () {
      var el = document.getElementById('app-loader');
      if (el) el.classList.add('is-hidden');
    };
    window.addEventListener('load', function () {
      requestAnimationFrame(function () { setTimeout(window.hideAppLoader, 120); });
    });
    setTimeout(function () { window.hideAppLoader(); }, 6000);
  </script>

  <aside class="sidebar" id="sidebar"></aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="hours-page">

        <!-- ── Stat bar ─────────────────────────────────────────── -->
        <div class="hours-statbar" id="hoursStatbar">
          <div class="hours-stat">
            <div class="hours-stat__label">This week
              <span class="flow-pill flow-pill--flat" id="weekDelta" hidden></span>
            </div>
            <div class="hours-stat__value" id="weekPay">—</div>
            <div class="hours-stat__sub" id="weekHours">— h</div>
          </div>
          <div class="hours-stat">
            <div class="hours-stat__label">This month</div>
            <div class="hours-stat__value" id="monthPay">—</div>
            <div class="hours-stat__sub" id="monthHours">— h</div>
          </div>
          <div class="hours-stat">
            <div class="hours-stat__label">Effective rate</div>
            <div class="hours-stat__value" id="effRate">—</div>
            <div class="hours-stat__sub" id="effRateSub">per hour · 30d</div>
          </div>
          <div class="hours-stat">
            <div class="hours-stat__label">All-time</div>
            <div class="hours-stat__value" id="totalPay">—</div>
            <div class="hours-stat__sub" id="totalShifts">— shifts</div>
          </div>
        </div>

        <!-- ── Goal + Quick log row ─────────────────────────────── -->
        <div class="hours-row hours-row--two">

          <!-- Weekly goal -->
          <section class="term hours-goal" id="goalPanel">
            <div class="term__head">
              <span class="term__title">Weekly goal</span>
              <button type="button" class="btn btn--ghost btn--sm" id="editGoalBtn">Edit</button>
            </div>
            <div class="term__body">
              <div class="goal-display" id="goalDisplay">
                <div class="goal-ring" id="goalRing"></div>
                <div class="goal-info">
                  <div class="goal-info__pct" id="goalPct">—</div>
                  <div class="goal-info__detail" id="goalDetail">No goal set yet</div>
                  <div class="goal-info__pace" id="goalPace"></div>
                </div>
              </div>
              <form class="goal-edit" id="goalEdit" hidden>
                <div class="seg-toggle goal-metric">
                  <button type="button" class="seg-btn active" data-metric="pay">Earnings</button>
                  <button type="button" class="seg-btn" data-metric="hours">Hours</button>
                </div>
                <div class="goal-edit__field">
                  <span class="goal-edit__prefix" id="goalPrefix">$</span>
                  <input type="number" id="goalTarget" class="form-control" min="0" step="1" placeholder="0" />
                  <span class="goal-edit__suffix" id="goalSuffix">/ week</span>
                </div>
                <div class="goal-edit__actions">
                  <button type="submit" class="btn btn--primary btn--sm">Save goal</button>
                  <button type="button" class="btn btn--ghost btn--sm" id="clearGoalBtn">Clear</button>
                </div>
              </form>
            </div>
          </section>

          <!-- Quick log -->
          <section class="term hours-quick" id="quickPanel">
            <div class="term__head">
              <span class="term__title">Quick log</span>
              <button type="button" class="btn btn--primary btn--sm" id="addShiftBtn">+ Log shift</button>
            </div>
            <div class="term__body">
              <div class="hours-presets" id="hoursPresets"></div>
              <p class="hours-quick__hint" id="quickHint" hidden>
                Save a shift as a preset to log repeat days in one tap.
              </p>
            </div>
          </section>
        </div>

        <!-- ── Earnings chart ───────────────────────────────────── -->
        <section class="term hours-chart" id="chartPanel">
          <div class="term__head">
            <span class="term__title">Earnings · last <span id="chartWeeks">10</span> weeks</span>
            <div class="seg-toggle" id="chartMetricToggle">
              <button type="button" class="seg-btn active" data-metric="pay">Pay</button>
              <button type="button" class="seg-btn" data-metric="hours">Hours</button>
            </div>
          </div>
          <div class="term__body">
            <div class="hours-bars" id="hoursBars"></div>
          </div>
        </section>

        <!-- ── Breakdown duo ────────────────────────────────────── -->
        <div class="hours-row hours-row--two">

          <!-- By day of week -->
          <section class="term" id="dowPanel">
            <div class="term__head">
              <span class="term__title">By day of week</span>
              <span class="term-label" id="dowBest"></span>
            </div>
            <div class="term__body">
              <div class="dow-grid" id="dowGrid"></div>
            </div>
          </section>

          <!-- By job -->
          <section class="term" id="jobPanel">
            <div class="term__head">
              <span class="term__title">By job</span>
              <span class="term-label">all-time</span>
            </div>
            <div class="term__body term__body--flush">
              <div id="jobList"></div>
            </div>
          </section>
        </div>

        <!-- ── Log-shift form ───────────────────────────────────── -->
        <section class="term shift-form-card" id="shiftFormCard" hidden>
          <div class="term__head">
            <span class="term__title" id="shiftFormTitle">Log shift</span>
            <button type="button" class="btn btn--ghost btn--sm" id="closeShiftForm" aria-label="Close">✕</button>
          </div>
          <div class="term__body">
          <form id="shiftForm">
            <input type="hidden" id="sEditId" />

            <div class="form-group">
              <label class="form-label">Day</label>
              <div class="day-chips" id="dayChips"></div>
              <input type="date" id="sDate" class="form-control day-fallback" />
            </div>

            <div class="form-group">
              <label class="form-label" for="sEmployer">Employer / job</label>
              <input type="text" id="sEmployer" class="form-control" placeholder="e.g. Café" maxlength="60" list="employerList" />
              <datalist id="employerList"></datalist>
            </div>

            <div class="shift-form-grid">
              <div class="form-group">
                <label class="form-label" for="sStart">Start</label>
                <input type="time" id="sStart" class="form-control" />
              </div>
              <div class="form-group">
                <label class="form-label" for="sEnd">End</label>
                <input type="time" id="sEnd" class="form-control" />
              </div>
              <div class="form-group">
                <label class="form-label" for="sBreak">Break (min)</label>
                <input type="number" id="sBreak" class="form-control" min="0" step="5" value="0" />
              </div>
              <div class="form-group">
                <label class="form-label" for="sTips">Tips (optional)</label>
                <input type="number" id="sTips" class="form-control" min="0" step="0.01" placeholder="0.00" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">How were you paid?</label>
              <div class="paymode-toggle">
                <button type="button" class="paymode-btn active" data-mode="hourly">Hourly rate</button>
                <button type="button" class="paymode-btn" data-mode="fixed">Total paid</button>
              </div>
            </div>

            <div class="shift-form-grid">
              <div class="form-group" id="hourlyField">
                <label class="form-label" for="sRate">Hourly rate</label>
                <input type="number" id="sRate" class="form-control" min="0" step="0.01" placeholder="0.00" />
              </div>
              <div class="form-group" id="fixedField" hidden>
                <label class="form-label" for="sFixed">Total paid</label>
                <input type="number" id="sFixed" class="form-control" min="0" step="0.01" placeholder="0.00" />
              </div>
            </div>

            <div class="shift-pay-preview" id="shiftPayPreview">—</div>

            <label class="shift-checkbox">
              <input type="checkbox" id="sLogIncome" checked />
              <span>Log as income (adds it to your balance &amp; cash flow)</span>
            </label>
            <div class="shift-form-grid shift-income-fields" id="shiftIncomeFields">
              <div class="form-group">
                <label class="form-label" for="sAccount">Deposit to</label>
                <select id="sAccount" class="form-control"></select>
              </div>
              <div class="form-group">
                <label class="form-label" for="sCategory">Income category</label>
                <select id="sCategory" class="form-control"></select>
              </div>
            </div>

            <div class="shift-form-actions">
              <button type="submit" class="btn btn--primary" id="shiftSubmit" style="flex:1;">Save</button>
              <button type="button" class="btn btn--ghost btn--sm" id="savePresetBtn">Save as preset</button>
              <button type="button" class="btn btn--danger btn--sm" id="shiftDelete" hidden>Delete</button>
            </div>
          </form>
          </div>
        </section>

        <!-- ── Logged hours ─────────────────────────────────────── -->
        <section class="term hours-log">
          <div class="term__head">
            <span class="term__title">Logged hours</span>
            <select id="employerFilter" class="hours-filter" hidden></select>
          </div>
          <div class="term__body term__body--flush">
            <div id="shiftsList">
              <div class="empty-state">Loading…</div>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="../scripts/components/error-overlay.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/engine/shifts.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/components/dialog.js"></script>
  <script src="../scripts/pages/shifts.js"></script>
</body>
</html>
