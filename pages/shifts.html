<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Shifts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body data-title="Shifts">

  <aside class="sidebar" id="sidebar"></aside>
  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">
      <div class="shifts-page">

        <!-- Stats -->
        <div class="budget-summary-strip shifts-stats">
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">This week</div>
            <div class="budget-summary-card__value" id="weekPay">—</div>
            <div class="shift-stat__sub" id="weekHours">— h</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">This month</div>
            <div class="budget-summary-card__value" id="monthPay">—</div>
            <div class="shift-stat__sub" id="monthHours">— h</div>
          </div>
          <div class="card budget-summary-card">
            <div class="budget-summary-card__label">All-time logged</div>
            <div class="budget-summary-card__value" id="totalPay">—</div>
            <div class="shift-stat__sub" id="totalShifts">— shifts</div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="shifts-toolbar">
          <h2 class="shifts-heading">Logged shifts</h2>
          <button type="button" class="btn btn--primary btn--sm" id="addShiftBtn">+ Add shift</button>
        </div>

        <!-- Form -->
        <div class="card shift-form-card" id="shiftFormCard" style="display:none;">
          <div class="shift-form-card__head">
            <span class="term__title" id="shiftFormTitle">New shift</span>
            <button type="button" class="btn btn--ghost btn--sm" id="closeShiftForm" aria-label="Close">✕</button>
          </div>
          <form id="shiftForm">
            <input type="hidden" id="sEditId" />
            <div class="shift-form-grid">
              <div class="form-group">
                <label class="form-label" for="sDate">Date</label>
                <input type="date" id="sDate" class="form-control" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="sEmployer">Employer / job</label>
                <input type="text" id="sEmployer" class="form-control" placeholder="e.g. Café" maxlength="60" />
              </div>
              <div class="form-group">
                <label class="form-label" for="sStart">Start</label>
                <input type="time" id="sStart" class="form-control" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="sEnd">End</label>
                <input type="time" id="sEnd" class="form-control" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="sBreak">Break (min)</label>
                <input type="number" id="sBreak" class="form-control" min="0" step="5" value="0" />
              </div>
              <div class="form-group">
                <label class="form-label" for="sRate">Hourly rate</label>
                <input type="number" id="sRate" class="form-control" min="0" step="0.01" placeholder="0.00" />
              </div>
            </div>

            <div class="shift-pay-preview" id="shiftPayPreview">—</div>

            <label class="shift-checkbox">
              <input type="checkbox" id="sLogIncome" checked />
              <span>Log this shift as income (adds it to your balance &amp; cash flow)</span>
            </label>

            <div class="shift-form-grid shift-income-fields" id="shiftIncomeFields">
              <div class="form-group">
                <label class="form-label" for="sAccount">Deposit to account</label>
                <select id="sAccount" class="form-control"></select>
              </div>
              <div class="form-group">
                <label class="form-label" for="sCategory">Income category</label>
                <select id="sCategory" class="form-control"></select>
              </div>
            </div>

            <div class="shift-form-actions">
              <button type="submit" class="btn btn--primary" id="shiftSubmit" style="flex:1;">Save shift</button>
              <button type="button" class="btn btn--danger btn--sm" id="shiftDelete" style="display:none;">Delete</button>
            </div>
          </form>
        </div>

        <!-- List -->
        <div class="card shifts-list-card">
          <div id="shiftsList">
            <div class="empty-state">Loading…</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/engine/shifts.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/shifts.js"></script>
</body>
</html>
