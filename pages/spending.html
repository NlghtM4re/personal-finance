<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <title>Flow — Cash Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/pages.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
</head>
<body data-title="Cash Flow">

  <aside class="sidebar" id="sidebar"></aside>

  <div class="overlay" id="overlay"></div>

  <div class="main-wrapper">
    <header class="topbar" id="topbar"></header>

    <main class="main-content">

      <!-- Spending / Income toggle -->
      <div class="seg-toggle" role="tablist" aria-label="View">
        <button type="button" class="seg-btn active" id="modeExpense" data-mode="expense" role="tab" aria-selected="true">Spending</button>
        <button type="button" class="seg-btn" id="modeIncome" data-mode="income" role="tab" aria-selected="false">Income</button>
      </div>

      <!-- Period picker -->
      <div class="spending-period-bar">
        <div class="month-nav">
          <button class="btn btn--ghost btn--sm" id="monthNavPrev" aria-label="Previous month">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="month-nav__label" id="monthNavLabel"></span>
          <button class="btn btn--ghost btn--sm" id="monthNavNext" aria-label="Next month">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="spending-summary-chips">
          <span class="hero-stat-chip">
            <span class="hero-stat-chip__label">Spent</span>
            <span class="hero-stat-chip__value" id="spendTotal" style="color:var(--color-expense)">$0.00</span>
          </span>
          <span class="hero-stat-chip__sep">·</span>
          <span class="hero-stat-chip">
            <span class="hero-stat-chip__label">Income</span>
            <span class="hero-stat-chip__value" id="spendIncome" style="color:var(--color-income)">$0.00</span>
          </span>
          <span class="hero-stat-chip__sep">·</span>
          <span class="hero-stat-chip">
            <span class="hero-stat-chip__label">Net</span>
            <span class="hero-stat-chip__value" id="spendNet">$0.00</span>
          </span>
        </div>
      </div>

      <!-- Category breakdown: donut + ranked list in one panel -->
      <section class="card chart-card cat-overview">
        <div class="card-header">
          <h2 class="card-title" id="catTitle">Spending by Category</h2>
        </div>
        <div class="cat-overview__body">
          <div class="chart-container chart-container--donut cat-overview__donut">
            <canvas id="categoryCanvas" role="img" aria-label="Category breakdown donut chart"></canvas>
            <div class="chart-empty" id="categoryChartEmpty"><span>No data this period.</span></div>
          </div>
          <div id="spendingBreakdown" class="spending-breakdown cat-overview__list"></div>
        </div>
      </section>

      <!-- Monthly trend -->
      <section class="card chart-card chart-card--full">
        <div class="card-header">
          <h2 class="card-title" id="trendTitle">Spending Trend</h2>
          <select class="select--sm" id="trendYear"></select>
        </div>
        <div class="chart-container">
          <canvas id="trendCanvas" role="img" aria-label="Monthly trend bar chart"></canvas>
          <div class="chart-empty" id="trendChartEmpty"><span>No data yet.</span></div>
        </div>
      </section>


    </main>
  </div>

  <nav class="bottom-nav" id="bottomNav" aria-label="Main navigation"></nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../scripts/data/supabase.js"></script>
  <script src="../scripts/data/store.js"></script>
  <script src="../scripts/components/icons.js"></script>
  <script src="../scripts/engine/summary.js"></script>
  <script src="../scripts/components/charts.js"></script>
  <script src="../scripts/components/nav.js"></script>
  <script src="../scripts/components/ui.js"></script>
  <script src="../scripts/pages/spending.js"></script>
</body>
</html>
