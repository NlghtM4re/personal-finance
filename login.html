<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinTrack — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      background: #f7f8fa;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .login-logo-icon { font-size: 1.75rem; line-height: 1; }
    .login-logo-text { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
    .login-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: -0.01em;
    }
    .login-sub {
      font-size: 0.875rem;
      color: #6b7280;
      margin-bottom: 28px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-label { font-size: 0.8125rem; font-weight: 500; color: #6b7280; }
    .form-control {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .btn-primary {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background .15s;
      letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 0.875rem;
      color: #6b7280;
    }
    .toggle-link {
      color: #4f46e5;
      font-weight: 500;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-size: inherit;
      padding: 0;
    }
    .toggle-link:hover { text-decoration: underline; }
    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 0.8125rem;
      margin-bottom: 14px;
      display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: #dcfce7;
      color: #16a34a;
      border: 1px solid #86efac;
      border-radius: 6px;
      padding: 10px 13px;
      font-size: 0.8125rem;
      margin-bottom: 14px;
      display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-logo">
      <span class="login-logo-icon">💰</span>
      <span class="login-logo-text">FinTrack</span>
    </div>

    <div class="login-title" id="cardTitle">Welcome back</div>
    <div class="login-sub"   id="cardSub">Sign in to your account</div>

    <div class="error-msg"   id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <form id="authForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn-primary" type="submit" id="submitBtn">Sign in</button>
    </form>

    <div class="toggle-row">
      <span id="toggleText">Don't have an account?</span>
      <button class="toggle-link" id="toggleBtn">Create one</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="scripts/data/supabase.js"></script>
  <script>
    (async () => {
      // Already logged in → go to dashboard
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.replace('index.html');
    })();

    let isSignUp = false;

    function showError(msg)   { const el = document.getElementById('errorMsg');   el.textContent = msg; el.classList.add('show'); document.getElementById('successMsg').classList.remove('show'); }
    function showSuccess(msg) { const el = document.getElementById('successMsg'); el.textContent = msg; el.classList.add('show'); document.getElementById('errorMsg').classList.remove('show'); }
    function clearMessages()  { document.getElementById('errorMsg').classList.remove('show'); document.getElementById('successMsg').classList.remove('show'); }

    document.getElementById('toggleBtn').addEventListener('click', () => {
      isSignUp = !isSignUp;
      clearMessages();
      document.getElementById('cardTitle').textContent  = isSignUp ? 'Create account'    : 'Welcome back';
      document.getElementById('cardSub').textContent    = isSignUp ? 'Start tracking your finances' : 'Sign in to your account';
      document.getElementById('submitBtn').textContent  = isSignUp ? 'Create account'    : 'Sign in';
      document.getElementById('toggleText').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggleBtn').textContent  = isSignUp ? 'Sign in'           : 'Create one';
      document.querySelector('input[autocomplete="current-password"]').autocomplete = isSignUp ? 'new-password' : 'current-password';
    });

    document.getElementById('authForm').addEventListener('submit', async e => {
      e.preventDefault();
      clearMessages();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');
      if (!email || !password) { showError('Please enter your email and password.'); return; }

      btn.disabled = true;
      btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';

      try {
        if (isSignUp) {
          const { error } = await sb.auth.signUp({ email, password });
          if (error) throw error;
          showSuccess('Account created! Check your email to confirm, then sign in.');
          isSignUp = false;
          document.getElementById('toggleBtn').click();
        } else {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) throw error;
          window.location.replace('index.html');
        }
      } catch (err) {
        showError(err.message || 'Something went wrong. Please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = isSignUp ? 'Create account' : 'Sign in';
      }
    });
  </script>
</body>
</html>
